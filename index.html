<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK's DeepSeek Viewer - 深度求索会话查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            display: flex;
            height: 100vh;
            max-width: 100%;
        }
        
        /* 侧边栏样式 */
        .sidebar {
            width: 400px;
            background: white;
            border-right: 1px solid #e1e5e9;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 10px 20px;
            border-bottom: 1px solid #e1e5e9;
            background: #f8f9fa;
        }
        
        .sidebar-header h1 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        /* 上传区域样式 */
        .upload-section {
            background: #f0f7ff;
            border-radius: 8px;
            border: 2px dashed #10a37f;
        }
        
        .upload-box {
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .upload-box:hover {
            background-color: #e6f7f2;
        }
        
        .upload-icon {
            font-size: 48px;
            color: #10a37f;
        }
        
        .upload-text {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            color: #6c757d;
            font-size: 12px;
            margin-top: 5px;
        }
        
        #fileInput {
            display: none;
        }
        
        .current-file {
            padding: 10px;
            background: #e8f5e9;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .file-name {
            font-weight: 600;
            color: #2e7d32;
            word-break: break-all;
        }
        
        .search-box {
            padding: 15px 20px;
            border-bottom: 1px solid #e1e5e9;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .search-box input:focus {
            border-color: #10a37f;
        }
        
        /* 新增搜索选项样式 */
        .search-options {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #2c3e50;
        }
        
        .search-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .search-options input[type="radio"] {
            cursor: pointer;
            accent-color: #10a37f;
        }
        
        .conversation-info {
            padding: 10px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e1e5e9;
            font-size: 14px;
            color: #6c757d;
        }
        
        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        .conversation-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
        }
        
        .conversation-item:hover {
            background-color: #f8f9fa;
        }
        
        .conversation-item.active {
            background-color: #e3f2fd;
            border-left: 3px solid #10a37f;
        }
        
        .conversation-title {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .conversation-date {
            color: #6c757d;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .conversation-preview {
            color: #6c757d;
            font-size: 13px;
            margin-top: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 主内容区样式 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-header {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e1e5e9;
        }
        
        .content-header h2 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .content-meta {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 15px; /* 给示意图留空间 */
        }

        /* 分支示意图样式 */
        .branch-diagram {
            background: #f0f7ff;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 10px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            border: 1px solid #d0e0f0;
            overflow-x: auto;
            white-space: nowrap;
        }
        .branch-diagram .path-row {
            margin: 4px 0;
            color: #2c3e50;
        }
        .branch-diagram .node-tag {
            display: inline-block;
            background: #e3f2fd;
            border-radius: 12px;
            padding: 2px 10px;
            margin: 0 2px;
            border: 1px solid #90caf9;
            font-weight: 500;
        }
        .node-tag.duplicate {
            color: transparent !important;
            /* 保留背景色和边框，仅文字透明 */
        }
        .branch-diagram .arrow {
            margin: 0 4px;
            color: #90a4ae;
        }
        .branch-toggle-btn {
            margin-top: 8px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 4px 16px;
            font-size: 12px;
            cursor: pointer;
            display: inline-block;
        }
        .branch-toggle-btn:hover {
            background: #0d8c6d;
        }
        .branch-folded, .branch-expanded {
            transition: all 0.2s;
        }
        .branch-expanded {
            display: none;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            background: white;
        }
        
        .message {
            margin-bottom: 5px;
            padding: 20px;
            border-radius: 12px;
            position: relative;
            border: 1px solid #e1e5e9;
        }
        
        .message-think {
            background: #f8f9fa;
            border-left: 4px solid #6c757d;
            margin-bottom: 0px;
        }
        
        .message-response {
            background: #e3f2fd;
            border-left: 4px solid #1976d2;
        }
        
        .message-request {
            background: #e8f5e8;
            border-left: 4px solid #2e7d32;
            margin-top: 50px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            color: #6c757d;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .message-type, .message-id {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.1);
        }
        .message-id {
            background: rgba(16, 163, 127, 0.15); /* 轻微区分 */
            margin-left: 4px;
        }
        
        .message-time {
            font-size: 11px;
            margin-left: auto; /* 确保靠右 */
        }
        
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.6;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }
        
        .message-files {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.03);
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid #e1e5e9;
        }
        
        .file-item {
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e1e5e9;
        }
        
        .file-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .file-content {
            white-space: pre-wrap;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: 40vh;
            }
            
            .main-content {
                height: 60vh;
            }
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #10a37f;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .code-block {
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 16px;
            margin: 10px 0;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.45;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>JK's DeepSeek Viewer - 深度求索会话查看器</h1>
                
                <!-- 上传区域 -->
                <div class="upload-section">
                    <input type="file" id="fileInput" accept=".json">
                    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">点击上传DeepSeek会话导出文件（JSON）</div>
                    </div>
                    <div id="currentFile" class="current-file" style="display: none;">
                        <div>当前文件：<span class="file-name" id="fileName"></span></div>
                    </div>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索对话标题、内容或时间...">
                <!-- 新增搜索范围选项 -->
                <div class="search-options">
                    <label>
                        <input type="radio" name="searchMode" value="title" checked> 标题/预览
                    </label>
                    <label>
                        <input type="radio" name="searchMode" value="full"> 全文搜索
                    </label>
                </div>
            </div>
            
            <div class="conversation-info" id="conversationInfo">
                请上传JSON文件开始查看
            </div>
            
            <div class="conversation-list" id="conversationList">
                <div class="empty-state">
                    <h3>暂无对话</h3>
                    <p>上传JSON文件后，对话列表将显示在这里</p>
                </div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <div class="content-header" id="contentHeader">
                <div class="empty-state">
                    <h3>选择对话</h3>
                    <p>从左侧列表中选择一个对话查看详情</p>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <h3>暂无内容</h3>
                    <p>选择一个对话开始浏览</p>
                </div>
            </div>
            
            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <div>加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let conversationsData = [];
        let currentConversationId = null;
        let currentFileName = '';
        let conversationMap = new Map(); // ID到对话对象的映射，用于快速查找
        
        // DOM 元素
        const fileInput = document.getElementById('fileInput');
        const fileNameElement = document.getElementById('fileName');
        const currentFileElement = document.getElementById('currentFile');
        const conversationInfo = document.getElementById('conversationInfo');
        const searchInput = document.getElementById('searchInput');
        const conversationList = document.getElementById('conversationList');
        const contentHeader = document.getElementById('contentHeader');
        const messagesContainer = document.getElementById('messagesContainer');
        const loadingIndicator = document.getElementById('loadingIndicator');
        
        // 防抖定时器
        let searchTimeout = null;
        
        // 文件上传处理
        fileInput.addEventListener('change', handleFileUpload);
        
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            currentFileName = file.name;
            fileNameElement.textContent = currentFileName;
            currentFileElement.style.display = 'block';
            
            loadingIndicator.classList.add('active');
            conversationList.innerHTML = '';
            
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const jsonData = JSON.parse(e.target.result);
                    processJSONData(jsonData);
                } catch (error) {
                    console.error('JSON解析错误:', error);
                    showError('JSON文件格式错误，请确保上传的是有效的DeepSeek对话导出文件');
                } finally {
                    loadingIndicator.classList.remove('active');
                }
            };
            
            reader.onerror = function() {
                showError('文件读取失败，请重试');
                loadingIndicator.classList.remove('active');
            };
            
            reader.readAsText(file);
        }
        
        // 处理JSON数据
        function processJSONData(data) {
            try {
                if (!Array.isArray(data)) {
                    if (data.conversations && Array.isArray(data.conversations)) {
                        data = data.conversations;
                    } else if (data.data && Array.isArray(data.data)) {
                        data = data.data;
                    } else {
                        throw new Error('JSON格式不支持，请确保是DeepSeek对话导出文件');
                    }
                }
                
                // 按时间排序，并为每个对话生成唯一ID
                conversationsData = data.sort((a, b) => {
                    const timeA = a.inserted_at || a.created_at || '';
                    const timeB = b.inserted_at || b.created_at || '';
                    return new Date(timeB) - new Date(timeA);
                }).map((conv, index) => {
                    // 确保每个对话都有唯一ID
                    if (!conv.id && !conv.conversation_id) {
                        conv.id = `conv_${index}`;
                    } else {
                        conv.id = conv.id || conv.conversation_id;
                    }
                    return conv;
                });
                
                // 预计算全文搜索文本（小写，不区分大小写）
                conversationsData.forEach(conv => {
                    conv._fullText = buildFullText(conv).toLowerCase();
                });
                
                // 建立ID到对话的映射，用于快速查找
                conversationMap = new Map(conversationsData.map(conv => [conv.id, conv]));
                
                conversationInfo.innerHTML = `共 ${conversationsData.length} 个对话`;
                
                if (conversationsData.length > 0) {
                    renderConversationList();
                    // 应用当前搜索条件
                    filterConversations();
                    // 默认显示第一个对话
                    showConversation(conversationsData[0].id);
                } else {
                    conversationList.innerHTML = '<div class="empty-state"><h3>没有找到对话</h3><p>JSON文件中没有对话数据</p></div>';
                }
            } catch (error) {
                console.error('数据处理错误:', error);
                showError(`数据处理错误: ${error.message}`);
            }
        }
        
        // 构建全文搜索文本（提取所有消息内容、文件名、文件内容等）
        function buildFullText(conv) {
            const texts = [];
            
            // 添加标题（如果存在）
            if (conv.title) texts.push(conv.title);
            
            if (conv.mapping) {
                const nodes = extractMessagesFromMapping(conv.mapping);
                nodes.forEach(node => {
                    if (node.message) addMessageText(node.message, texts);
                });
            } else if (conv.messages) {
                conv.messages.forEach(msg => addMessageText(msg, texts));
            } else if (conv.content) {
                texts.push(conv.content);
            }
            
            return texts.join(' ');
        }
        
        // 从消息对象中提取文本
        function addMessageText(msg, texts) {
            if (msg.content) texts.push(msg.content);
            if (msg.fragments) {
                msg.fragments.forEach(f => {
                    if (f.content) texts.push(f.content);
                });
            }
            if (msg.text) texts.push(msg.text);
            if (msg.files) {
                msg.files.forEach(f => {
                    if (f.file_name) texts.push(f.file_name);
                    if (f.content) texts.push(f.content);
                });
            }
            // 可能还有其它字段，根据需要添加
        }
        
        // 渲染对话列表
        function renderConversationList() {
            let listHTML = '';
            
            conversationsData.forEach((conv, index) => {
                const title = conv.title || conv.name || `对话 ${index + 1}`;
                const insertedAt = conv.inserted_at || conv.created_at || conv.timestamp || '';
                const preview = extractPreview(conv);
                
                listHTML += `
                    <div class="conversation-item" 
                         data-id="${conv.id}" 
                         data-title="${escapeHTML(title)}"
                         data-preview="${escapeHTML(preview)}"
                         data-datetime="${escapeHTML(insertedAt)}"
                         onclick="showConversation('${conv.id}')">
                        <div class="conversation-title">${escapeHTML(title)}</div>
                        <div class="conversation-date">${formatDateTime(insertedAt)}</div>
                        <div class="conversation-preview">${escapeHTML(preview)}</div>
                    </div>
                `;
            });
            
            conversationList.innerHTML = listHTML;
        }
        
        // 提取预览（保持不变）
        function extractPreview(conversation) {
            if (conversation.preview || conversation.last_message) {
                return conversation.preview || conversation.last_message;
            }
            
            if (conversation.mapping) {
                for (const key in conversation.mapping) {
                    const node = conversation.mapping[key];
                    if (node && node.message && node.message.content) {
                        const content = node.message.content;
                        return content.substring(0, 100) + (content.length > 100 ? '...' : '');
                    }
                }
            }
            
            if (conversation.messages && conversation.messages.length > 0) {
                const lastMsg = conversation.messages[conversation.messages.length - 1];
                if (lastMsg.content) {
                    const content = lastMsg.content;
                    return content.substring(0, 100) + (content.length > 100 ? '...' : '');
                }
            }
            
            return '无内容预览';
        }
        
        // 从mapping中提取所有消息节点（复用原有函数）
        function extractMessagesFromMapping(mapping) {
            const messages = [];
            
            function traverse(nodeId) {
                const node = mapping[nodeId];
                if (!node) return;
                
                if (node.message) {
                    messages.push(node);
                }
                
                if (node.children) {
                    node.children.forEach(childId => {
                        traverse(childId);
                    });
                }
            }
            
            const rootKey = Object.keys(mapping).find(key => key === 'root' || mapping[key].parent === null);
            if (rootKey) {
                traverse(rootKey);
            } else {
                Object.keys(mapping).forEach(key => {
                    const node = mapping[key];
                    if (node && node.message) {
                        messages.push(node);
                    }
                });
            }
            
            return messages;
        }
        
        // 搜索输入事件（带防抖）
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                filterConversations();
            }, 300);
        });
        
        // 搜索模式切换事件
        document.querySelectorAll('input[name="searchMode"]').forEach(radio => {
            radio.addEventListener('change', function() {
                filterConversations();
            });
        });
        
        // 过滤对话列表
        function filterConversations() {
            // 如果没有对话数据，直接返回（保持原有提示）
            if (conversationsData.length === 0) return;

            const searchTerm = searchInput.value.trim().toLowerCase();
            const mode = document.querySelector('input[name="searchMode"]:checked').value;
            const items = conversationList.getElementsByClassName('conversation-item');
            
            let visibleCount = 0;

            for (let item of items) {
                const title = item.getAttribute('data-title').toLowerCase();
                const preview = item.getAttribute('data-preview').toLowerCase();
                const dateTime = item.getAttribute('data-datetime').toLowerCase();

                let matches = false;

                if (mode === 'title') {
                    // 仅搜索标题、预览、时间
                    matches = !searchTerm || title.includes(searchTerm) || preview.includes(searchTerm) || dateTime.includes(searchTerm);
                } else {
                    // 全文搜索：标题、预览、时间 + 全文内容
                    const convId = item.getAttribute('data-id');
                    const conversation = conversationMap.get(convId);
                    const fullText = conversation ? conversation._fullText : '';
                    matches = !searchTerm || title.includes(searchTerm) || preview.includes(searchTerm) || dateTime.includes(searchTerm) || (fullText && fullText.includes(searchTerm));
                }

                item.style.display = matches ? 'block' : 'none';
                if (matches) visibleCount++;
            }

            // 更新对话信息：显示总数和搜索结果数
            const total = conversationsData.length;
            conversationInfo.innerHTML = `共 ${total} 个对话，搜索结果 ${visibleCount} 个`;
        }
        
        // 显示对话详情
        function showConversation(conversationId) {
            if (currentConversationId === conversationId) return;
            
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            const selectedItem = document.querySelector(`[data-id="${conversationId}"]`);
            if (selectedItem) {
                selectedItem.classList.add('active');
            }
            
            currentConversationId = conversationId;
            loadingIndicator.classList.add('active');
            
            const conversation = conversationMap.get(conversationId);
            
            if (conversation) {
                setTimeout(() => {
                    renderConversation(conversation);
                    loadingIndicator.classList.remove('active');
                }, 100);
            } else {
                showError('找不到指定的对话');
                loadingIndicator.classList.remove('active');
            }
        }
        
        // ---------- 新增：根据节点获取类型缩写 ----------
        function getNodeTypeAbbr(node) {
            if (!node || !node.message || !node.message.fragments) return '?';
            const fragments = node.message.fragments;
            const types = new Set(fragments.map(f => f.type));
            if (types.has('THINK') && types.has('RESPONSE')) return '思答';
            if (types.has('THINK')) return '思';
            if (types.has('RESPONSE')) return '答';
            if (types.has('REQUEST')) return '问';
            return '?';
        }

        // ---------- 新增：从mapping构建所有根到叶子的路径 ----------
        function buildPathsFromMapping(mapping) {
            const paths = [];
            const root = mapping['root'];
            if (!root || !root.children) return paths;

            function dfs(nodeId, currentPath) {
                const node = mapping[nodeId];
                if (!node) return;
                const abbr = node.message ? getNodeTypeAbbr(node) : '';
                const newPath = [...currentPath, { id: nodeId, abbr }];
                if (node.children && node.children.length > 0) {
                    node.children.forEach(childId => dfs(childId, newPath));
                } else {
                    paths.push(newPath);
                }
            }

            root.children.forEach(childId => dfs(childId, []));
            return paths;
        }

        // ---------- 新增：生成分支示意图HTML（带折叠展开）----------
        // 替换原有的 generateBranchDiagramHTML 函数
        function generateBranchDiagramHTML(paths) {
            if (!paths || paths.length === 0) return '<div class="branch-diagram">无对话分支</div>';

            // 1. 对路径按节点 ID 序列排序，使公共前缀相邻
            const sortedPaths = paths.slice().sort((a, b) => {
                const strA = a.map(n => n.id).join('|');
                const strB = b.map(n => n.id).join('|');
                return strA.localeCompare(strB);
            });

            // 2. 标记每条路径中与前一条路径重复的前缀节点
            const enhancedPaths = [];
            for (let i = 0; i < sortedPaths.length; i++) {
                const currentPath = sortedPaths[i];
                const enhancedPath = currentPath.map(node => ({ ...node, duplicate: false }));
                if (i > 0) {
                    const prevPath = sortedPaths[i - 1];
                    let commonLen = 0;
                    while (commonLen < currentPath.length && commonLen < prevPath.length &&
                           currentPath[commonLen].id === prevPath[commonLen].id) {
                        commonLen++;
                    }
                    for (let j = 0; j < commonLen; j++) {
                        enhancedPath[j].duplicate = true;
                    }
                }
                enhancedPaths.push(enhancedPath);
            }

            // 3. 根据缩写获取背景色（与对应消息类型一致）
            function getBgColor(abbr) {
                if (abbr === '问') return '#e8f5e8';       // message-request
                if (abbr === '思') return '#f8f9fa';       // message-think
                if (abbr === '答' || abbr === '思答') return '#e3f2fd'; // message-response
                return '#e3f2fd'; // 默认
            }

            // 4. 渲染增强后的路径（带 duplicate 标记）
            function renderEnhancedPaths(pathSlice) {
                return pathSlice.map(path => {
                    const nodesHtml = path.map((node, idx) => {
                        const arrow = idx < path.length - 1 ? '<span class="arrow">→</span>' : '';
                        const bgColor = getBgColor(node.abbr);
                        const duplicateClass = node.duplicate ? ' duplicate' : '';
                        // 使用 escapeHTML 保证安全，背景色通过内联设置
                        return `<span class="node-tag${duplicateClass}" style="background-color: ${bgColor};">${escapeHTML(node.id)} (${escapeHTML(node.abbr)})</span>${arrow}`;
                    }).join('');
                    return `<div class="path-row">${nodesHtml}</div>`;
                }).join('');
            }

            const total = enhancedPaths.length;
            const foldLimit = 4;
            const foldedHtml = renderEnhancedPaths(enhancedPaths.slice(0, foldLimit));
            const expandedHtml = renderEnhancedPaths(enhancedPaths);

            let html = '<div class="branch-diagram" id="branchDiagramContainer">';
            if (total <= foldLimit) {
                html += `<div class="branch-folded">${foldedHtml}</div>`;
            } else {
                html += `<div class="branch-folded" id="branchFolded">${foldedHtml}</div>`;
                html += `<div class="branch-expanded" id="branchExpanded" style="display:none;">${expandedHtml}</div>`;
                html += `<button class="branch-toggle-btn" onclick="toggleBranchDiagram(this)">展开全部 (${total}行)</button>`;
            }
            html += '</div>';
            return html;
        }

        // 全局切换函数
        window.toggleBranchDiagram = function(btn) {
            const container = btn.parentElement;
            const foldedDiv = container.querySelector('#branchFolded') || container.querySelector('.branch-folded');
            const expandedDiv = container.querySelector('#branchExpanded') || container.querySelector('.branch-expanded');
            if (!foldedDiv || !expandedDiv) return;
            if (expandedDiv.style.display === 'none') {
                foldedDiv.style.display = 'none';
                expandedDiv.style.display = 'block';
                btn.textContent = '收起';
            } else {
                foldedDiv.style.display = 'block';
                expandedDiv.style.display = 'none';
                btn.textContent = `展开全部 (${conversationMap.get(currentConversationId) ? buildPathsFromMapping(conversationMap.get(currentConversationId).mapping).length : 0}行)`;
            }
        };

        // 修改 renderConversation 加入分支示意图
        function renderConversation(conversation) {
            const insertedAt = formatDateTimeFull(conversation.inserted_at || conversation.created_at);
            const updatedAt = formatDateTimeFull(conversation.updated_at || conversation.modified_at || conversation.inserted_at);
            const title = conversation.title || conversation.name || '无标题对话';
            const convId = conversation.id || '未知';
            
            let branchHtml = '';
            if (conversation.mapping) {
                const paths = buildPathsFromMapping(conversation.mapping);
                branchHtml = generateBranchDiagramHTML(paths);
            }

            // 修改 renderConversation 函数中构建 contentHeader 的部分
            // 将 content-meta 和 branchHtml 放入 Flex 容器左右并列
            contentHeader.innerHTML = `
                <h2>${escapeHTML(title)}</h2>
                <div style="display: flex; gap: 24px; flex-wrap: wrap;"> <!-- 保留 flex-wrap 以适配小屏 -->
                    <div class="content-meta" style="flex: 1 1 0; margin:0;">
                        <div>创建时间: ${insertedAt}</div>
                        <div>更新时间: ${updatedAt}</div>
                        <div>ID: ${convId}</div>
                    </div>
                    <div style="flex: 2 1 0; min-width: 0;">  <!-- 原 branch 区域 -->
                        ${branchHtml}
                    </div>
                    <div style="flex: 1 1 0;"></div>          <!-- 新增右侧空白占位 -->
                </div>
            `;
            
            messagesContainer.innerHTML = '';
            
            if (conversation.mapping) {
                renderMappingMessages(conversation.mapping);
            } else if (conversation.messages) {
                renderSimpleMessages(conversation.messages);
            } else if (conversation.content) {
                renderContent(conversation);
            } else {
                messagesContainer.innerHTML = '<div class="empty-state"><h3>无消息内容</h3><p>此对话没有可显示的消息</p></div>';
            }
            
            messagesContainer.scrollTop = 0;
        }
        
        function renderMappingMessages(mapping) {
            const messages = extractMessagesFromMapping(mapping);
            
            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div class="empty-state"><h3>无消息内容</h3><p>mapping结构中没有找到消息</p></div>';
                return;
            }
            
            messages.forEach(messageNode => {
                if (messageNode.message) {
                    // 传递节点ID
                    const messageElement = createMessageElement(messageNode.message, messageNode.id);
                    messagesContainer.appendChild(messageElement);
                }
            });
        }
        
        function renderSimpleMessages(messages) {
            messages.forEach(message => {
                const messageElement = createMessageElement(message, null); // 无节点ID
                messagesContainer.appendChild(messageElement);
            });
        }
        
        function renderContent(conversation) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-response';
            
            let content = conversation.content;
            if (typeof content !== 'string') {
                content = JSON.stringify(content, null, 2);
            }
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-type">CONTENT</span>
                    <span class="message-time">${formatDateTimeFull(conversation.inserted_at || conversation.created_at)}</span>
                </div>
                <div class="message-content">${escapeHTML(content)}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
        }
        
        // 修改 createMessageElement 接受 nodeId
        function createMessageElement(message, nodeId = null) {
            // 如果消息有多个fragment，分别为每个fragment创建消息元素
            if (message.fragments && message.fragments.length > 1) {
                const container = document.createDocumentFragment();
                for (const fragment of message.fragments) {
                    const fragMessage = { ...message, fragments: [fragment] };
                    const elem = createMessageElement(fragMessage, nodeId); // 同一个nodeId传给每个fragment
                    container.appendChild(elem);
                }
                return container;
            }
            
            // 以下是原来的单消息逻辑（适用于没有fragments或fragments长度为1的情况）
            const messageDiv = document.createElement('div');
            
            let messageType = 'unknown';
            let messageClass = 'message';
            
            if (message.role) {
                messageType = message.role;
                messageClass = `message message-${messageType}`;
            } else if (message.fragments && message.fragments.length > 0) {
                const fragment = message.fragments[0];
                messageType = fragment.type || 'unknown';
                messageClass = `message message-${messageType.toLowerCase()}`;
            } else if (message.model) {
                messageType = 'assistant';
                messageClass = 'message message-response';
            } else if (message.author && message.author.role) {
                messageType = message.author.role;
                messageClass = `message message-${messageType}`;
            }
            
            const messageTime = message.inserted_at || message.created_at || message.timestamp || '';
            
            let messageContent = '';
            
            if (message.content) {
                messageContent = message.content;
            } else if (message.fragments) {
                // 这里fragments长度应该是1，但为了通用，仍然循环拼接
                message.fragments.forEach(fragment => {
                    if (fragment.content) {
                        messageContent += fragment.content + '\n\n';
                    }
                });
            } else if (message.text) {
                messageContent = message.text;
            }
            
            let filesInfo = '';
            if (message.files && message.files.length > 0) {
                filesInfo = '<div class="message-files"><strong>文件:</strong><br>';
                message.files.forEach(file => {
                    filesInfo += `<div class="file-item">`;
                    filesInfo += `<div class="file-name">• ${file.file_name || file.name || '未命名文件'} (ID: ${file.id || '无ID'})</div>`;
                    if (file.content) {
                        filesInfo += `<div class="file-content">${escapeHTML(file.content)}</div>`;
                    }
                    filesInfo += `</div>`;
                });
                filesInfo += '</div>';
            }
            
            let metadata = '';
            if (message.metadata) {
                metadata = `<div class="message-files"><strong>元数据:</strong><br><pre>${JSON.stringify(message.metadata, null, 2)}</pre></div>`;
            }
            
            messageDiv.className = messageClass;
            // 在message-type右边添加message-id（如果存在）
            const typeSpan = `<span class="message-type">${messageType.toUpperCase()}</span>`;
            const idSpan = nodeId ? `<span class="message-id">${nodeId}</span>` : '';
            messageDiv.innerHTML = `
                <div class="message-header">
                    ${typeSpan}${idSpan}
                    <span class="message-time">${formatDateTimeFull(messageTime)}</span>
                </div>
                <div class="message-content">${escapeHTML(messageContent.trim())}</div>
                ${filesInfo}
                ${metadata}
            `;
            
            return messageDiv;
        }
        
        // 工具函数
        function formatDateTime(dateString) {
            if (!dateString) return '未知时间';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;
                return date.toLocaleString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit'
                });
            } catch (e) {
                return dateString;
            }
        }
        
        function formatDateTimeFull(dateString) {
            if (!dateString) return '未知时间';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;
                return date.toLocaleString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
            } catch (e) {
                return dateString;
            }
        }
        
        function escapeHTML(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML
                .replace(/\n/g, '<br>')
                .replace(/\t/g, '&nbsp;&nbsp;&nbsp;&nbsp;')
                .replace(/  /g, '&nbsp;&nbsp;');
        }
        
        function showError(message) {
            conversationList.innerHTML = `<div class="error-message">${message}</div>`;
            contentHeader.innerHTML = '<div class="empty-state"><h3>错误</h3><p>请上传有效的JSON文件</p></div>';
            messagesContainer.innerHTML = '<div class="empty-state"><h3>错误</h3><p>无法加载对话内容</p></div>';
        }
        
        // 拖放上传支持
        document.addEventListener('DOMContentLoaded', function() {
            const uploadBox = document.querySelector('.upload-box');
            
            uploadBox.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadBox.style.backgroundColor = '#e6f7f2';
            });
            
            uploadBox.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadBox.style.backgroundColor = '';
            });
            
            uploadBox.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadBox.style.backgroundColor = '';
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (file.name.endsWith('.json')) {
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        fileInput.files = dataTransfer.files;
                        const event = new Event('change', { bubbles: true });
                        fileInput.dispatchEvent(event);
                    } else {
                        showError('请上传JSON格式的文件');
                    }
                }
            });
        });
    </script>
</body>
</html>
